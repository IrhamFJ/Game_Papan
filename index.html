<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keymapper Vercel Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <style>
        :root { --bg: #050505; --green: #00ff41; --blue: #0070f3; }
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg); color: var(--green); 
            margin: 0; padding: 20px; overflow: hidden;
        }
        .header { border-bottom: 1px solid var(--green); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Display Utama */
        #main-display {
            background: #111;
            border: 2px solid var(--green);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .key-code { font-size: 4rem; color: white; text-shadow: 0 0 10px var(--green); }

        /* Console Log di Layar */
        #onscreen-log {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #333;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 5px;
        }
        .log-line { border-bottom: 1px solid #222; padding: 3px 0; }
        .system { color: var(--blue); }
        .success { color: #f0f; }
    </style>
</head>
<body>

    <div class="header">
        <strong>KEYMAPPER DEBUGGER v1.0</strong><br>
        <small id="url-info">Status: Online (Vercel)</small>
    </div>

    <div id="main-display">
        KEY PRESSED:<br>
        <div id="keyText" class="key-code">READY</div>
    </div>

    <div id="onscreen-log">
        <div class="log-line system">[SYS] Inisialisasi debugger...</div>
        <div class="log-line system">[SYS] Eruda Engine: Aktif.</div>
        <div class="log-line">[!] Silahkan klik di mana saja untuk fokus.</div>
    </div>

    <script>
        // Aktifkan Eruda (Tombol Gear di pojok kanan bawah)
        eruda.init();

        const keyText = document.getElementById('keyText');
        const logContainer = document.getElementById('onscreen-log');

        function addLog(msg, type = '') {
            const div = document.createElement('div');
            div.className = `log-line ${type}`;
            const now = new Date().toLocaleTimeString().split(' ')[0];
            div.innerHTML = `[${now}] ${msg}`;
            logContainer.prepend(div);
            console.log(`[${now}] ${msg}`); // Juga muncul di Eruda
        }

        // Listener Utama
        window.addEventListener('keydown', (e) => {
            // Mencegah fungsi bawaan (Volume, Scroll, dll)
            e.preventDefault();

            const keyInfo = {
                key: e.key,
                code: e.code,
                keyCode: e.keyCode
            };

            // Update UI
            keyText.innerText = e.key === " " ? "SPACE" : e.key.toUpperCase();
            
            // Log Detail
            addLog(`Detected: <span class="success">${keyInfo.key}</span> (Code: ${keyInfo.code})`, 'success');
        }, { passive: false });

        // Memastikan halaman punya fokus
        window.addEventListener('click', () => {
            addLog("Focus gained via click", "system");
        });

        addLog("Sistem siap. Link Vercel terdeteksi.", "system");
    </script>
</body>
</html>
