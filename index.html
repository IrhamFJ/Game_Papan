<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Game Hub - Catur & Checkers</title>
    <style>
        :root {
            --bg: #2c3e50;
            --wood: #8e44ad;
            --light: #ecf0f1;
            --dark: #34495e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; }
        .hidden { display: none !important; }
        
        /* Menu Styles */
        #main-menu { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }

        /* Game Board Styles */
        #game-container { padding: 20px; }
        .board { 
            display: grid; 
            margin: 20px auto; 
            border: 5px solid #222;
            width: 400px;
            height: 400px;
        }
        .square { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; }
        .white { background: #f0d9b5; }
        .black { background: #b58863; }
        .selected { background: #769656 !important; }

        /* Status UI */
        .status-bar { margin-bottom: 15px; font-size: 1.2rem; }
        .room-info { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>🏆 Game Papan Online</h1>
        <div class="room-info">
            <input type="text" id="room-code" placeholder="Masukkan Kode Mabar...">
        </div>
        <button class="btn btn-primary" onclick="startGame('chess')">Main Catur (Chess)</button>
        <button class="btn btn-primary" onclick="startGame('checkers')">Main Checkers</button>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="game-title">Game</h2>
        <div class="status-bar">Giliran: <span id="turn-display">Putih</span></div>
        <div id="board" class="board"></div>
        <button class="btn" style="background: #e74c3c;" onclick="exitToMenu()">Keluar ke Menu</button>
    </div>

    <script>
        let currentGame = '';
        let selectedSquare = null;
        let turn = 'white';

        // Inisialisasi Game
        function startGame(type) {
            currentGame = type;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-title').innerText = type.toUpperCase();
            
            const code = document.getElementById('room-code').value || "LOKAL";
            console.log(`Bergabung ke room: ${code}`);

            renderBoard();
        }

        function exitToMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }

        // Render Papan (8x8)
        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = 'repeat(8, 1fr)';

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = `square ${(row + col) % 2 === 0 ? 'white' : 'black'}`;
                    square.dataset.row = row;
                    square.dataset.col = col;
                    
                    // Setup Bidak Awal
                    if (currentGame === 'chess') {
                        setupChessPieces(square, row, col);
                    } else {
                        setupCheckersPieces(square, row, col);
                    }

                    square.onclick = () => handleSquareClick(square);
                    boardElement.appendChild(square);
                }
            }
        }

        // Logika Bidak Catur (Sederhana untuk demo)
        function setupChessPieces(sq, r, c) {
            const pieces = {
                0: ['♜','♞','♝','♛','♚','♝','♞','♜'],
                1: ['♟','♟','♟','♟','♟','♟','♟','♟'],
                6: ['♙','♙','♙','♙','♙','♙','♙','♙'],
                7: ['♖','♘','♗','♕','♔','♗','♘','♖']
            };
            if (pieces[r]) sq.innerText = pieces[r][c];
        }

        // Logika Bidak Checkers
        function setupCheckersPieces(sq, r, c) {
            if ((r + c) % 2 !== 0) {
                if (r < 3) sq.innerText = '🔴';
                if (r > 4) sq.innerText = '⚪';
            }
        }

        // Handler Klik (Sistem Gerak Dasar)
        function handleSquareClick(sq) {
            if (selectedSquare) {
                // Logic Pindah Bidak
                if (sq !== selectedSquare) {
                    sq.innerText = selectedSquare.innerText;
                    selectedSquare.innerText = '';
                    turn = (turn === 'white') ? 'black' : 'white';
                    document.getElementById('turn-display').innerText = turn === 'white' ? 'Putih' : 'Hitam';
                }
                selectedSquare.classList.remove('selected');
                selectedSquare = null;
            } else {
                if (sq.innerText !== '') {
                    selectedSquare = sq;
                    sq.classList.add('selected');
                }
            }
        }
    </script>
</body>
</html>
